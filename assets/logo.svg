<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#020810"/>
      <stop offset="100%" stop-color="#0e2848"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0c2244"/>
      <stop offset="100%" stop-color="#040f22"/>
    </linearGradient>
    <linearGradient id="refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fef6d0" stop-opacity="0.70"/>
      <stop offset="55%"  stop-color="#fef0b0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fef6d0" stop-opacity="0"/>
    </linearGradient>
    <filter id="moonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="reflBlur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="frame">
      <rect width="300" height="300" rx="22"/>
    </clipPath>
  </defs>

  <rect width="300" height="300" rx="22" fill="url(#sky)"/>
  <g clip-path="url(#frame)">

  <!-- Stars -->
  <circle cx="28"  cy="28"  r="1.4" fill="#fef3c7" opacity="0.85"/>
  <circle cx="62"  cy="16"  r="1.0" fill="#fef3c7" opacity="0.75"/>
  <circle cx="102" cy="34"  r="1.2" fill="#fef3c7" opacity="0.80"/>
  <circle cx="44"  cy="66"  r="0.9" fill="#fef3c7" opacity="0.55"/>
  <circle cx="78"  cy="54"  r="0.8" fill="#fef3c7" opacity="0.50"/>
  <circle cx="232" cy="24"  r="1.1" fill="#fef3c7" opacity="0.75"/>
  <circle cx="267" cy="48"  r="0.9" fill="#fef3c7" opacity="0.60"/>
  <circle cx="252" cy="72"  r="0.8" fill="#fef3c7" opacity="0.50"/>
  <circle cx="196" cy="32"  r="1.0" fill="#fef3c7" opacity="0.65"/>
  <circle cx="172" cy="58"  r="0.8" fill="#fef3c7" opacity="0.45"/>

  <!-- Moon (full, large, centered) -->
  <circle cx="150" cy="98" r="62" fill="#fef8e7" filter="url(#moonGlow)" opacity="0.12"/>
  <circle cx="150" cy="98" r="46" fill="#fef6d0" opacity="0.97"/>

  <!-- Sea -->
  <path d="M-2 192 L302 192 L302 302 L-2 302 Z" fill="url(#sea)"/>

  <!-- Moon reflection (tapered column, blurred) -->
  <path d="M 143 192 L 112 298 L 188 298 L 157 192 Z"
        fill="url(#refl)" filter="url(#reflBlur)"/>

  <!-- Waves -->
  <path d="M-2 207 Q38 199 76 207 Q113 215 150 207 Q188 199 226 207 Q263 215 302 207"
        fill="none" stroke="#1e4d8c" stroke-width="2"   opacity="0.55" stroke-linecap="round"/>
  <path d="M-2 226 Q38 218 76 226 Q113 234 150 226 Q188 218 226 226 Q263 234 302 226"
        fill="none" stroke="#1a4580" stroke-width="1.8" opacity="0.38" stroke-linecap="round"/>
  <path d="M-2 248 Q38 240 76 248 Q113 256 150 248 Q188 240 226 248 Q263 256 302 248"
        fill="none" stroke="#163d70" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Moonlight glimmer on wave crests -->
  <path d="M 132 207 Q 150 204 168 207"
        fill="none" stroke="#fef6d0" stroke-width="1.8" opacity="0.40" stroke-linecap="round"/>
  <path d="M 122 226 Q 150 222 178 226"
        fill="none" stroke="#fef6d0" stroke-width="1.4" opacity="0.25" stroke-linecap="round"/>
  <path d="M 110 248 Q 150 243 190 248"
        fill="none" stroke="#fef6d0" stroke-width="1.1" opacity="0.15" stroke-linecap="round"/>

  <!-- Border -->
  <rect width="300" height="300" rx="22"
        fill="none" stroke="#162d52" stroke-width="2"/>

  </g>
</svg>
